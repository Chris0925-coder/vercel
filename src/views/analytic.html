<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title><%=title%></title>

    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="/styles/main.css"
    />
    <script src="/scripts/main.js" defer></script>

    <!-- <link rel="favicon" href="" /> -->
    <!-- <link rel="icon" type="image/x-icon" href="favicon.ico" sizes="any" /> -->
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="/home">Home</a></li>
          <li><a href="/upload">Upload</a></li>
          <!-- <li><a href="./register.html">Register</a></li> -->
        </ul>
      </nav>
    </header>
    <h1>Visitas</h1>
    <div
      style="
        display: flex;
        width: 250px;
        flex-direction: column;
        overflow: hidden;
      "
    >
      <% tab.forEach((data) => { %>

      <article
        style="
          display: grid;
          border: 2px solid;
          border-radius: 5px;
          padding: 5px;
          margin: 7px;
          font-size: 0.7rem;
          place-content: center;
          overflow: auto;
        "
      >
        <h2><a href="<%=data.domain%>" target="_blank"><%=data.domain%></a></h2>
        <p>CONTEO de VISITAS: <%=data.count%></p>
        <p>Desde: <span><%=data.date%></span></p>
        <p>Clicks: <span><%=data.clicks%></span></p>
      </article>

      <% }) %>
    </div>

    <hr />
    <br />

    <section
      style="
        width: 90vw;
        height: 400px;
        overflow: scroll;
        margin: 0 auto;
        scrollbar-width: none;
        font-size: 0.7rem;
      "
    >
      <h2>Form WebDev</h2>
      <div
        style="
          display: flex;
          flex-direction: row;
          justify-content: center;
          width: 100%;
          flex-wrap: wrap;
        "
        id="messages"
      ></div>
    </section>
  </body>
</html>
